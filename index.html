<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortimer - Levica Land</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1a0d;color:#d0e8d0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a4a2a;border-radius:4px}
.app{max-width:900px;margin:0 auto;padding:12px 24px 20px;min-height:100vh}
.hdr{text-align:center;margin-bottom:4px}
.hdr h1{font-size:34px;font-family:Georgia,serif;font-style:italic;color:#4ADE80;text-shadow:0 0 20px #4ADE8033}
.hdr .sub{font-size:10px;letter-spacing:3px;color:#5a8a5a;text-transform:uppercase;margin-top:2px}
.hdr .day{font-size:13px;color:#6a9a6a;margin-top:2px}
.tnav{display:flex;gap:8px;margin:8px auto 4px;max-width:460px}
.tnav button{flex:1;padding:8px 0;background:#0f240f;border:1px solid #2a4a2a;border-radius:10px;color:#6EE7B7;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.tnav button:hover{background:#1a3a1a;border-color:#3a5a3a}
.mzone{position:relative;text-align:center;flex-shrink:0}
.mimg{width:200px;height:auto;transition:filter .5s ease}
.mimg.dim{filter:brightness(.85) saturate(.7)}
.bub{position:absolute;top:-12px;left:50%;transform:translateX(-50%);z-index:10;background:#1e3a1e;border:1px solid #3a6a3a;border-radius:14px;padding:9px 16px;max-width:240px;font-size:13px;color:#c0dcc0;text-align:center;line-height:1.4;box-shadow:0 4px 16px #00000044;display:none;white-space:normal}
.bub.on{display:block;animation:pop .25s ease-out}
.bwrap{text-align:center;margin:2px 0 8px}
.badge{display:inline-block;font-size:13px;padding:3px 14px;border-radius:20px}
.sbox{background:#0f240f;border:1px solid #1e3a1e;border-radius:14px;padding:12px 14px;margin-bottom:8px;max-width:460px;margin-left:auto;margin-right:auto}
.br{margin-bottom:8px}
.bl{display:flex;justify-content:space-between;margin-bottom:2px;font-size:12px}
.bl .n{color:#8aaa8a}
.bl .v{font-weight:600}
.bt{height:7px;background:#1a2e1a;border-radius:6px;overflow:hidden;border:1px solid #223322}
.bf{height:100%;border-radius:6px;transition:width .5s ease}
.hr{margin-top:6px;padding-top:6px;border-top:1px solid #1e3a1e;display:flex;justify-content:space-between;font-size:12px}
.hr .n{color:#5a8a5a}
.hr .v{font-weight:700}
.mort-row{display:flex;align-items:center;justify-content:space-between;margin:0 0 4px;padding:0 10px}
.side-col{display:flex;flex-direction:column;gap:16px;align-items:center}
.orb{width:100px;height:100px;border-radius:50%;background:#1e3a1e;border:2px solid #3a6a3a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;padding:0;gap:3px;font-family:inherit}
.orb:hover:not(:disabled){background:#2a5a2a;border-color:#5a9a5a;transform:scale(1.06);box-shadow:0 0 14px #4ADE8022}
.orb:disabled{background:#152015;border-color:#1e2e1e;opacity:.4;cursor:not-allowed}
.orb .i{font-size:36px;line-height:1}
.orb .l{font-size:12px;color:#7aaa7a;line-height:1;margin-top:2px;font-weight:600}
.orb:disabled .l{color:#3a5a3a}
.meds-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:460px;margin:8px auto 0;padding:16px 20px;background:#1e3a1e;border:2px solid #3a6a3a;border-radius:28px;cursor:pointer;transition:all .15s;font-family:inherit}
.meds-btn:hover:not(:disabled){background:#2a5a2a;border-color:#5a9a5a;box-shadow:0 0 14px #4ADE8022}
.meds-btn:disabled{background:#152015;border-color:#1e2e1e;opacity:.4;cursor:not-allowed}
.meds-btn .i{font-size:28px}
.meds-btn .l{font-size:15px;color:#c0dcc0;font-weight:600}
.meds-btn:disabled .l{color:#3a5a3a}
.ft{text-align:center;padding:4px 0;font-size:9px;color:#2a4a2a;letter-spacing:2px}
.sv{padding:12px 20px 20px}
.bbk{background:none;border:none;color:#4ADE80;font-size:14px;cursor:pointer;padding:8px 0;margin-bottom:8px;font-family:inherit}
.sv h2{color:#6EE7B7;font-size:18px;margin:0 0 12px;font-weight:600}
.pnl{background:#0f240f;border:1px solid #1e3a1e;border-radius:14px;overflow:hidden}
.pnlp{padding:16px}
.le{padding:10px 12px;border-bottom:1px solid #1a2e1a;display:flex;gap:10px;align-items:flex-start}
.le .ei{font-size:18px;flex-shrink:0;margin-top:2px}
.le .eb{flex:1;min-width:0}
.le .et{display:flex;justify-content:space-between;gap:8px}
.le .ea{font-weight:600;color:#c0dcc0;font-size:13px}
.le .em{font-size:11px;color:#5a7a5a;white-space:nowrap;flex-shrink:0}
.le .eq{font-size:12px;color:#7aaa7a;font-style:italic;margin-top:3px}
.sr{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid #1a2e1a}
.sr:last-child{border-bottom:none}
.sr .sl{color:#7aaa7a}
.sr .sv2{color:#c0dcc0;font-weight:500}
.sr .dng{color:#F87171}
.thdr{font-size:13px;color:#5a8a5a;margin:10px 0 6px;padding-top:10px;border-top:1px solid #2a4a2a;font-weight:600}
.tr{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.tr .tl{color:#7aaa7a}
.tr .tv{color:#c0dcc0;font-weight:500}
.rbtn{margin-top:20px;width:100%;padding:10px 0;background:#2a1a1a;border:1px solid #5a2a2a;border-radius:10px;color:#F87171;font-size:12px;cursor:pointer;font-family:inherit}
.elog{text-align:center;padding:30px 20px;color:#5a7a5a;font-style:italic}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(6px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
</style>
</head>

function pick(a){return a[Math.floor(Math.random()*a.length)]}

var SKEY="mort-tamagotchi-v2", HR=3600000, DAY=86400000;

function defaults(){
  return {hydration:70,sunlight:60,happiness:65,pruning:70,
    lastWatered:null,lastSunlight:null,lastTalked:null,
    lastRotated:null,lastPruned:null,lastMeds:null,
    lastDecay:Date.now(),overwaterCount:0,
    totals:{water:0,sun:0,talk:0,rotate:0,prune:0,meds:0,soil:0},
    born:1742457600000,careLog:[]};
}

var S=null, view="main", btimer=null, atimer=null, dtimer=null;

async function load(){
  try{var r=localStorage.getItem(SKEY);if(r)S=JSON.parse(r);else S=defaults();}
  catch(e){S=defaults();}
  draw();startTimers();
}
async function save(){try{localStorage.setItem(SKEY,JSON.stringify(S));}catch(e){}}

function hp(){return Math.round(S.hydration*.3+S.sunlight*.25+S.happiness*.25+S.pruning*.2)}
function mood(){
  if(S.hydration>90)return"overwatered";
  if(S.hydration<20)return"thirsty";
  if(S.pruning<25)return"overgrown";
  var h=hp();
  if(h<25)return"neglected";
  if(h>75&&S.hydration>50&&S.sunlight>50&&S.happiness>50&&S.pruning>50)return"thriving";
  return"happy";
}
function since(ts){
  if(!ts)return"never";
  var d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<1)return"just now";if(m<60)return m+"m ago";
  var h=Math.floor(m/60);if(h<24)return h+"h ago";
  return Math.floor(h/24)+"d ago";
}
function alog(action,icon,cat){
  S.careLog.push({action:action,icon:icon,time:Date.now(),comment:pick(QUIPS[cat]||[])});
}
function say(msg){
  if(btimer)clearTimeout(btimer);
  var el=document.getElementById("bub");
  if(el){el.textContent=msg;el.className="bub on";}
  btimer=setTimeout(function(){var b=document.getElementById("bub");if(b)b.className="bub";},4500);
}
function decay(){
  var hrs=(Date.now()-S.lastDecay)/HR;
  if(hrs<1)return;
  S.hydration=Math.max(0,S.hydration-hrs*1.5);
  S.sunlight=Math.max(0,S.sunlight-hrs*1.0);
  S.happiness=Math.max(0,S.happiness-hrs*0.8);
  S.pruning=Math.max(0,S.pruning-hrs*0.5);
  S.lastDecay=Date.now();
  save();if(view==="main")draw();
}
function startTimers(){
  if(dtimer)clearInterval(dtimer);
  if(atimer)clearInterval(atimer);
  dtimer=setInterval(decay,60000);
  setTimeout(function(){say(pick(DLG[mood()]))},1500);
  atimer=setInterval(function(){say(pick(DLG[mood()]))},22000);
}

function doWater(){
  var gap=S.lastWatered?Date.now()-S.lastWatered:Infinity;
  if(S.hydration>85){
    S.overwaterCount++;S.hydration=Math.min(100,S.hydration+15);
    S.happiness=Math.max(0,S.happiness-5);S.lastWatered=Date.now();S.totals.water++;
    alog("Overwatered! (Count: "+S.overwaterCount+")","🌊","overwater");
    save();draw();say(pick(DLG.owarn));return;
  }
  if(gap<HR*2){say(pick(DLG.owarn));return;}
  S.hydration=Math.min(100,S.hydration+25);S.happiness=Math.min(100,S.happiness+3);
  S.lastWatered=Date.now();S.totals.water++;
  alog("Watered","💧","water");save();draw();say(pick(DLG.water));
}
function doSun(){
  S.sunlight=Math.min(100,S.sunlight+20);S.happiness=Math.min(100,S.happiness+3);
  S.lastSunlight=Date.now();S.totals.sun++;
  alog("Moved to sunlight","☀️","sun");save();draw();say(pick(DLG.sun));
}
function doTalk(){
  S.happiness=Math.min(100,S.happiness+15);S.lastTalked=Date.now();S.totals.talk++;
  alog("Talked to Mort","💬","talk");save();draw();say(pick(DLG.talk));
}
function doRotate(){
  var gap=S.lastRotated?Date.now()-S.lastRotated:Infinity;
  if(gap<DAY){say("I was just rotated. Still dizzy.");return;}
  S.sunlight=Math.min(100,S.sunlight+10);S.happiness=Math.min(100,S.happiness+5);
  S.lastRotated=Date.now();S.totals.rotate++;
  alog("Pot rotated","🔄","rotate");save();draw();say(pick(DLG.rotate));
}
function doPrune(){
  var gap=S.lastPruned?Date.now()-S.lastPruned:Infinity;
  if(gap<DAY*3){say("Just got pruned. Give me time to recover emotionally.");return;}
  S.pruning=Math.min(100,S.pruning+30);S.happiness=Math.max(0,S.happiness-3);
  S.lastPruned=Date.now();S.totals.prune++;
  alog("Pruned","✂️","prune");save();draw();say(pick(DLG.prune));
}
function doMeds(){
  var mon=new Date().getDay()===1;
  var gap=S.lastMeds?Date.now()-S.lastMeds:Infinity;
  if(gap<DAY){say("Already got my dose today!");return;}
  var b=mon?12:5;
  S.hydration=Math.min(100,S.hydration+b);S.sunlight=Math.min(100,S.sunlight+b);
  S.happiness=Math.min(100,S.happiness+(mon?15:8));S.pruning=Math.min(100,S.pruning+b);
  S.lastMeds=Date.now();S.totals.meds++;
  alog(mon?"MORT MEDS MONDAY! Full dose!":"Fertilizer (off-schedule)","💊","meds");
  var medsMsg=pick(DLG.meds)+(mon?"":" (Not Monday, but I'll take it.)");save();draw();say(medsMsg);
}
function doSoil(){
  var m=Math.round(S.hydration);
  var r=m>85?"Soaking wet. Do NOT water.":m>65?"Damp. Good for a few days.":m>45?"Drying out. Keep an eye.":m>25?"Top inch dry. Water soon.":"Bone dry. Water me now.";
  S.totals.soil++;alog("Soil check: "+m+"%","🌱","soil");
  save();draw();say("🌱 "+r);
}
function doReset(){
  if(confirm("Reset Mort? His entire history will be wiped.")){
    S=defaults();save();draw();say("*blinks* ...Who am I? Where am I?");
  }
}
function goView(v){view=v;draw();}

function bar(label,value,icon,color){
  var p=Math.max(0,Math.min(100,Math.round(value)));
  var lv=p>80?"Great":p>60?"Good":p>40?"Okay":p>20?"Low":"Critical";
  return '<div class="br"><div class="bl"><span class="n">'+icon+" "+label+'</span><span class="v" style="color:'+color+'">'+lv+" ("+p+'%)</span></div><div class="bt"><div class="bf" style="width:'+p+"%;background:linear-gradient(90deg,"+color+"88,"+color+')"></div></div></div>';
}

function draw(){
  if(!S)return;
  var app=document.getElementById("app");
  if(view==="log"){drawLog(app);return;}
  if(view==="stats"){drawStats(app);return;}

  var m=mood(),h=hp(),li=LABEL[m];
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var dn=days[new Date().getDay()];
  var isMon=new Date().getDay()===1;
  var wcd=S.lastWatered&&(Date.now()-S.lastWatered<HR*2);
  var rcd=S.lastRotated&&(Date.now()-S.lastRotated<DAY);
  var pcd=S.lastPruned&&(Date.now()-S.lastPruned<DAY*3);
  var mcd=S.lastMeds&&(Date.now()-S.lastMeds<DAY);
  var hc=h>70?"#4ADE80":h>40?"#FBBF24":"#F87171";
  var ht=h>80?"Excellent":h>60?"Good":h>40?"Fair":h>20?"Poor":"Critical";

  var o='<div class="hdr"><h1>Mortimer</h1>';
  o+='<div class="sub">Levica Land Resident Jade Plant</div>';
  o+='<div class="day">'+dn+"</div></div>";

  o+='<div class="tnav">';
  o+='<button onclick="goView(\'log\')">📋 Care Log</button>';
  o+='<button onclick="goView(\'stats\')">📊 Stats</button>';
  o+="</div>";

  o+='<div class="mort-row">';
  o+='<div class="side-col">';
  o+='<button class="orb" onclick="doWater()"'+(wcd?" disabled":"")+'><span class="i">💧</span><span class="l">Water</span></button>';
  o+='<button class="orb" onclick="doSun()"><span class="i">☀️</span><span class="l">Sun</span></button>';
  o+='<button class="orb" onclick="doTalk()"><span class="i">💬</span><span class="l">Talk</span></button>';
  o+='</div>';
  o+='<div class="mzone">';
  o+='<div class="bub" id="bub"></div>';
  o+='<img class="mimg'+(m==="neglected"?" dim":"")+'" src="'+IMG[m]+'" alt="Mort">';
  o+="</div>";
  o+='<div class="side-col">';
  o+='<button class="orb" onclick="doSoil()"><span class="i">🌱</span><span class="l">Soil</span></button>';
  o+='<button class="orb" onclick="doRotate()"'+(rcd?" disabled":"")+'><span class="i">🔄</span><span class="l">Rotate</span></button>';
  o+='<button class="orb" onclick="doPrune()"'+(pcd?" disabled":"")+'><span class="i">✂️</span><span class="l">Prune</span></button>';
  o+='</div>';
  o+='</div>';

  o+='<div class="bwrap"><span class="badge" style="background:'+li.color+'18;color:'+li.color+";border:1px solid "+li.color+'33">'+li.emoji+" "+li.text+"</span></div>";

  o+='<div class="sbox">';
  o+=bar("Soil Moisture",S.hydration,"💧","#60A5FA");
  o+=bar("Sunlight",S.sunlight,"☀️","#FBBF24");
  o+=bar("Happiness",S.happiness,"💚","#F472B6");
  o+=bar("Grooming",S.pruning,"✂️","#C084FC");
  o+='<div class="hr"><span class="n">🌿 Overall Health</span><span class="v" style="color:'+hc+'">'+ht+" ("+h+"%)</span></div>";
  o+="</div>";

  o+='<button class="meds-btn" onclick="doMeds()"'+(mcd?" disabled":"")+'><span class="i">💊</span><span class="l">'+(isMon?"🎉 Monday Mort Meds! 🎉":"Monday Mort Meds")+"</span></button>";

  o+='<div class="ft">LEVICA LAND BOTANICAL DIVISION\u2122 \u00B7 EST. 2026</div>';
  app.innerHTML=o;
}

function drawLog(app){
  var entries=S.careLog.slice().reverse().slice(0,50);
  var h='<div class="sv"><button class="bbk" onclick="goView(\'main\')">\u2190 Back to Mort</button>';
  h+="<h2>📋 Care Log</h2>";
  h+='<div class="pnl">';
  if(!entries.length){
    h+='<div class="elog">No care history yet. Be a good plant dad.</div>';
  } else {
    for(var i=0;i<entries.length;i++){
      var e=entries[i],d=new Date(e.time);
      var ds=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      var ts=d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
      h+='<div class="le"><span class="ei">'+e.icon+'</span><div class="eb"><div class="et"><span class="ea">'+e.action+'</span><span class="em">'+ds+" "+ts+"</span></div>";
      if(e.comment)h+='<div class="eq">\u201C'+e.comment+'\u201D</div>';
      h+="</div></div>";
    }
  }
  h+="</div></div>";
  app.innerHTML=h;
}

function drawStats(app){
  var age=Math.max(0,Math.floor((Date.now()-S.born)/DAY));
  var born=new Date(S.born).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  var rows=[
    ["🎂 Born",born],["📅 Age",age===0?"< 1 day":age+" day"+(age!==1?"s":"")],
    ["💧 Last watered",since(S.lastWatered)],["☀️ Last sunlight",since(S.lastSunlight)],
    ["💬 Last talked",since(S.lastTalked)],["🔄 Last rotated",since(S.lastRotated)],
    ["✂️ Last pruned",since(S.lastPruned)],["💊 Last meds",since(S.lastMeds)]
  ];
  var tots=[
    ["💧 Waters",S.totals.water,false],["☀️ Sunlight",S.totals.sun,false],
    ["💬 Talks",S.totals.talk,false],["🔄 Rotations",S.totals.rotate,false],
    ["✂️ Prunes",S.totals.prune,false],["💊 Meds",S.totals.meds,false],
    ["🌱 Soil checks",S.totals.soil,false],["🌊 Overwaters",S.overwaterCount,S.overwaterCount>0]
  ];
  var h='<div class="sv"><button class="bbk" onclick="goView(\'main\')">\u2190 Back to Mort</button>';
  h+="<h2>📊 Stats</h2>";
  h+='<div class="pnl pnlp">';
  for(var i=0;i<rows.length;i++){
    h+='<div class="sr"><span class="sl">'+rows[i][0]+'</span><span class="sv2">'+rows[i][1]+"</span></div>";
  }
  h+='<div class="thdr">Lifetime totals</div>';
  for(var i=0;i<tots.length;i++){
    h+='<div class="tr"><span class="tl">'+tots[i][0]+'</span><span class="tv'+(tots[i][2]?" dng":"")+'">'+tots[i][1]+"</span></div>";
  }
  h+='<button class="rbtn" onclick="doReset()">Reset Mort (cannot be undone)</button>';
  h+="</div></div>";
  app.innerHTML=h;
}

load();
</script>
</body>
</html>
